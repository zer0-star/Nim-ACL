<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Largest Rectangle</title>
  <link rel="stylesheet" href="../../lib/main.css">

  <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.37.5/src-min-noconflict/ace.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.37.5/src-min-noconflict/mode-nim.js"></script>
  <script>
    window.addEventListener("load", function () {
      if (!window.ace) return;

      ace.config.set(
        "basePath",
        "https://cdn.jsdelivr.net/npm/ace-builds@1.37.5/src-min-noconflict/"
      );

      for (const e of document.getElementsByClassName("sample-code")) {
        const code = e.textContent.replace(/^\n/, "").replace(/\s+$/, "");
        e.textContent = code;

        const editor = ace.edit(e);
        editor.setTheme("ace/theme/textmate");
        editor.getSession().setMode("ace/mode/nim");
        editor.getSession().setUseWrapMode(false);
        editor.setReadOnly(true);
        editor.setShowPrintMargin(false);
        editor.setHighlightActiveLine(false);
        editor.setHighlightGutterLine(false);
        editor.setOptions({
          maxLines: Infinity,
          minLines: 1,
          fontSize: "14px",
          tabSize: 2,
          useSoftTabs: true
        });

        editor.renderer.setShowGutter(true);
        editor.renderer.setScrollMargin(8, 8, 0, 0);

        const cursor = editor.renderer.$cursorLayer;
        if (cursor && cursor.element) {
          cursor.element.style.display = "none";
        }
      }
    });
  </script>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="site-brand" href="../../index.html">
      <img class="site-logo" src="../../lib/logo-crown.png" alt="" aria-hidden="true">
      <span class="site-title">Nim-ACL</span>
    </a>
  </header>
  <main>
<h1 id="largest-rectangle">Largest Rectangle</h1>
<p><code>largestRectangle(height)</code> は、histogram に含まれる最大長方形の面積を求めます。</p>
<h2 id="import">import</h2>
<pre><code class="language-nim">import atcoder/extra/dp/largest_rectangle
</code></pre>
<h2 id="_1">使用例</h2>
<pre><code class="language-nim">import atcoder/extra/dp/largest_rectangle

let h = @[2, 1, 5, 6, 2, 3]

doAssert largestRectangle(h) == 10
</code></pre>
<h2 id="_2">計算量</h2>
<p><code>height.len = n</code> とすると、</p>
<ul>
<li><code>O(n)</code></li>
</ul>
<p>です。</p>
  </main>
</body>
</html>
