name: pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install docs dependencies
        run: |
          python -m pip install -U pip
          if [ -f tools/requirements_docs.txt ]; then
            python -m pip install -r tools/requirements_docs.txt
          else
            python -m pip install Markdown toml jinja2 markupsafe
          fi

      - name: Build docs
        run: |
          python tools/generate_document.py

      - name: Build Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R document_ja document_en src README.md _config.yml _site/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
