name: quick-verify

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  quick-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.10'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install docs dependencies
        run: |
          python -m pip install -U pip
          if [ -f tools/requirements_docs.txt ]; then
            python -m pip install -r tools/requirements_docs.txt
          else
            python -m pip install Markdown toml jinja2 markupsafe
          fi

      - name: Build docs
        run: |
          python tools/generate_document.py

      - name: Run lightweight Nim tests
        run: |
          set -eu

          for f in \
            tests/test_extra_fps.nim \
            tests/test_extra_formal_power_series.nim \
            tests/test_extra_formal_power_series_sqrt.nim
          do
            if [ -f "$f" ]; then
              echo "### $f"
              nim cpp -r "$f"
              rm -f "${f%.nim}"
            else
              echo "skip missing: $f"
            fi
          done

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: quick-test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install docs dependencies
        run: |
          python -m pip install -U pip
          if [ -f tools/requirements_docs.txt ]; then
            python -m pip install -r tools/requirements_docs.txt
          else
            python -m pip install Markdown toml jinja2 markupsafe
          fi

      - name: Build docs
        run: |
          python tools/generate_document.py

      - name: Deploy to gh-pages
        run: |
          set -eu

          TMP="$(mktemp -d)"
          cp -R document_ja document_en src README.md _config.yml "$TMP"/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true

          git reset --hard
          git clean -fdx

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git switch gh-pages
          else
            git switch --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

          cp -R "$TMP"/* .

          git add -A

          if git diff --cached --quiet; then
            echo "No documentation changes to deploy."
          else
            git commit -m "[workflow] update generated documentation"
            git push origin gh-pages
          fi
