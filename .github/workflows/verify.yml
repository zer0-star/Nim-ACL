name: quick-verify

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  quick-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.10'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install docs dependencies
        run: |
          python -m pip install -U pip
          if [ -f tools/requirements_docs.txt ]; then
            python -m pip install -r tools/requirements_docs.txt
          else
            python -m pip install Markdown toml jinja2 markupsafe
          fi

      - name: Build docs
        run: |
          python tools/generate_document.py

      - name: Run lightweight Nim tests
        run: |
          set -eu

          for f in \
            tests/test_extra_fps.nim \
            tests/test_extra_formal_power_series.nim \
            tests/test_extra_formal_power_series_sqrt.nim
          do
            if [ -f "$f" ]; then
              echo "### $f"
              nim cpp -r "$f"
              rm -f "${f%.nim}"
            else
              echo "skip missing: $f"
            fi
          done
