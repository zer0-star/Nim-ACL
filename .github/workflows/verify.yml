name: quick-verify

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  quick-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.10'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install documentation dependencies
        run: |
          python -m pip install -U pip
          if [ -f tools/requirements_docs.txt ]; then
            python -m pip install -r tools/requirements_docs.txt
          elif [ -f tools/requirements.txt ]; then
            python -m pip install -r tools/requirements.txt
          fi
          python -m pip install Markdown toml jinja2 markupsafe

      - name: Run quick verify
        run: |
          bash tools/quick_verify.sh
