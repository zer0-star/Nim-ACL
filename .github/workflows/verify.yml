name: quick-verify

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  quick-verify:
    name: quick-verify / ${{ matrix.profile }} / Nim ${{ matrix.nim-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: latest
            nim-version: '2.2.10'
          - profile: atcoder
            nim-version: '2.2.4'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install documentation dependencies
        run: |
          python -m pip install -U pip
          if [ -f tools/requirements_docs.txt ]; then
            python -m pip install -r tools/requirements_docs.txt
          elif [ -f tools/requirements.txt ]; then
            python -m pip install -r tools/requirements.txt
          fi
          python -m pip install Markdown toml jinja2 markupsafe

      - name: Audit Nim version policy
        run: |
          python3 tools/audit_nim_version_matrix.py

      - name: Run quick verify
        env:
          NACL_NIM_PROFILE: ${{ matrix.profile }}
          NACL_NIM_EXPECTED_VERSION: ${{ matrix.nim-version }}
        run: |
          bash tools/run_nim_compatibility.sh "${{ matrix.profile }}"
