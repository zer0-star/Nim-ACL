name: oj-verify

on:
  workflow_dispatch:
    inputs:
      verify-target:
        description: 'all or a path relative to src/'
        required: true
        default: 'all'

permissions:
  contents: read

jobs:
  oj-verify:
    name: oj-verify / ${{ matrix.profile }} / Nim ${{ matrix.nim-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: latest
            nim-version: '2.2.10'
          - profile: atcoder
            nim-version: '2.2.4'

    steps:
      - uses: actions/checkout@v5

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install verification-helper
        run: |
          python -m pip install --upgrade pip 'setuptools<81' wheel
          python -m pip install --upgrade online-judge-verify-helper

      - name: Audit CI and Nim version policy
        run: |
          python3 tools/audit_nim_version_matrix.py
          python3 tools/audit_ci_workflows.py

      - name: Run oj-verify
        env:
          VERIFY_TARGET: ${{ inputs.verify-target }}
          OJ_VERIFY_JOBS: '2'
          YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
          NACL_NIM_PROFILE: ${{ matrix.profile }}
          NACL_NIM_EXPECTED_VERSION: ${{ matrix.nim-version }}
        run: |
          bash tools/run_oj_verify_target.sh "$VERIFY_TARGET"
