name: oj-verify

on:
  workflow_dispatch:
    inputs:
      verify-target:
        description: 'oj-verify target'
        required: true
        default: 'all'

jobs:
  oj-verify:
    name: oj-verify / ${{ matrix.profile }} / Nim ${{ matrix.nim-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: latest
            nim-version: '2.2.10'
          - profile: atcoder
            nim-version: '2.2.4'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install verification-helper
        run: |
          python -m pip install -U pip
          python -m pip install -U online-judge-verify-helper

      - name: Audit Nim version policy
        run: |
          python3 tools/audit_nim_version_matrix.py

      - name: Run oj-verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          NACL_NIM_PROFILE: ${{ matrix.profile }}
          NACL_NIM_EXPECTED_VERSION: ${{ matrix.nim-version }}
        run: |
          cd src
          oj-verify ${{ inputs.verify-target }}
